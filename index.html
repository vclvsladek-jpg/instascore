<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaScore - Reálné sportovní výsledky</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#08090c',
                            card: '#12141c',
                            border: '#1f2231',
                            neon: '#00ff66',
                            neonDim: 'rgba(0, 255, 102, 0.15)',
                            accent: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #08090c;
            color: #f1f5f9;
        }
        /* Neonový pulzující efekt pro živé zápasy */
        @keyframes pulse-neon {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 12px 4px rgba(0, 255, 102, 0.3);
            }
        }
        .live-pulse {
            animation: pulse-neon 2s infinite;
        }
        /* Efekt skla (Glassmorphism) */
        .glass {
            background: rgba(18, 20, 28, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        /* Skrytí scrollbaru */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden min-h-screen flex">

    <!-- LEVÝ PANEL (SIDEBAR) -->
    <aside class="w-64 border-r border-brand-border hidden md:flex flex-col h-screen sticky top-0 bg-brand-bg/95 backdrop-blur-md z-30 p-5">
        <!-- Logo -->
        <div class="flex items-center gap-3 px-2 py-4 mb-6">
            <div class="h-10 w-10 rounded-xl bg-brand-neon/10 border border-brand-neon/30 flex items-center justify-center">
                <i class="fa-solid fa-bolt text-brand-neon text-xl"></i>
            </div>
            <div>
                <span class="text-2xl font-extrabold tracking-wider bg-gradient-to-r from-white via-slate-100 to-brand-neon bg-clip-text text-transparent">Insta<span class="text-brand-neon">Score</span></span>
                <p class="text-[10px] text-gray-500 font-medium tracking-widest uppercase">Live sports data</p>
            </div>
        </div>

        <!-- Seznam Sportů -->
        <div class="flex flex-col gap-1">
            <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest px-3 mb-2">Sporty</p>
            
            <button onclick="switchSport('football')" id="btn-sport-football" class="flex items-center justify-between px-3 py-3 rounded-xl bg-brand-neon/10 text-brand-neon font-semibold transition-all duration-200">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-soccer-ball text-lg"></i>
                    <span>Fotbal</span>
                </div>
                <span class="text-xs bg-brand-neon/20 px-2 py-0.5 rounded-full" id="football-count">0</span>
            </button>

            <button onclick="switchSport('hockey')" id="btn-sport-hockey" class="flex items-center justify-between px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 font-semibold transition-all duration-200 mt-1">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-hockey-puck text-lg"></i>
                    <span>Hokej</span>
                </div>
                <span class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded-full">Demo</span>
            </button>

            <button onclick="switchSport('tennis')" id="btn-sport-tennis" class="flex items-center justify-between px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 font-semibold transition-all duration-200 mt-1">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-baseball-bat-ball text-lg"></i>
                    <span>Tenis</span>
                </div>
                <span class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded-full">Demo</span>
            </button>
        </div>

        <!-- Informační box o API -->
        <div class="mt-auto p-4 rounded-2xl bg-gradient-to-b from-brand-card to-brand-bg border border-brand-border text-center">
            <div class="h-8 w-8 rounded-full bg-brand-neon/20 flex items-center justify-center mx-auto mb-3">
                <i class="fa-solid fa-wifi text-brand-neon text-sm"></i>
            </div>
            <h4 class="text-sm font-bold text-white mb-1">Živé API aktivní</h4>
            <p class="text-xs text-gray-400">Právě stahujeme skutečná data z football-data.org.</p>
        </div>
    </aside>

    <!-- HLAVNÍ OBSAH -->
    <main class="flex-grow flex flex-col min-h-screen">
        <!-- TOP PANEL (HEADER) -->
        <header class="h-20 border-b border-brand-border bg-brand-bg/80 backdrop-blur-md sticky top-0 z-20 flex items-center justify-between px-4 md:px-8">
            <!-- Vyhledávač -->
            <div class="relative w-full max-w-md">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" id="search-input" oninput="filterMatches()" class="w-full bg-brand-card border border-brand-border rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-neon/50 focus:ring-1 focus:ring-brand-neon/30 transition-all duration-200" placeholder="Vyhledat tým nebo ligu...">
            </div>

            <!-- Uživatelský stav & Refresh -->
            <div class="flex items-center gap-4">
                <button onclick="loadRealFootballData()" class="p-2.5 rounded-xl bg-brand-card border border-brand-border hover:bg-white/5 transition-all text-gray-300 hover:text-brand-neon" title="Aktualizovat data">
                    <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i>
                </button>
                <div class="flex items-center gap-2.5 px-3 py-1.5 rounded-full bg-brand-neon/10 border border-brand-neon/20">
                    <div class="h-2 w-2 rounded-full bg-brand-neon live-pulse"></div>
                    <span class="text-xs font-semibold text-brand-neon">Reálná data</span>
                </div>
            </div>
        </header>

        <!-- OBSAHOVÁ ZÓNA -->
        <div class="p-4 md:p-8 flex-grow max-w-6xl w-full mx-auto">
            <!-- TLAČÍTKA FILTRU -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div class="flex gap-2 p-1 bg-brand-card/80 border border-brand-border rounded-xl self-start glass">
                    <button onclick="setStatusFilter('all')" id="btn-filter-all" class="px-4 py-2 rounded-lg text-sm font-bold bg-brand-neon text-brand-bg transition-all duration-200">
                        Všechny zápasy
                    </button>
                    <button onclick="setStatusFilter('live')" id="btn-filter-live" class="px-4 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white transition-all duration-200">
                        Pouze ŽIVĚ
                    </button>
                    <button onclick="setStatusFilter('finished')" id="btn-filter-finished" class="px-4 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white transition-all duration-200">
                        Ukončené
                    </button>
                </div>
                
                <span class="text-xs text-gray-500 font-medium" id="update-timestamp">Poslední aktualizace: --:--:--</span>
            </div>

            <!-- INDIKÁTOR NABÍHÁNÍ (LOADING) -->
            <div id="loading-state" class="hidden flex-col items-center justify-center py-20">
                <div class="h-12 w-12 border-4 border-brand-neon/20 border-t-brand-neon rounded-full animate-spin mb-4"></div>
                <p class="text-gray-400 text-sm">Načítám aktuální data ze sportovních stadionů...</p>
            </div>

            <!-- CHYBOVÝ STAV -->
            <div id="error-state" class="hidden max-w-xl mx-auto p-6 rounded-2xl bg-red-500/10 border border-red-500/20 text-center my-10">
                <i class="fa-solid fa-triangle-exclamation text-red-500 text-3xl mb-3"></i>
                <h3 class="text-lg font-bold text-white mb-1">Chyba při stahování dat</h3>
                <p class="text-sm text-gray-400 mb-4" id="error-message">Nepodařilo se připojit k datovému serveru.</p>
                <button onclick="loadRealFootballData()" class="px-4 py-2 bg-red-500 text-white rounded-xl text-sm font-bold hover:bg-red-600 transition-all">
                    Zkusit znovu
                </button>
            </div>

            <!-- KONTENÉR PRO ZÁPASY -->
            <div id="matches-container" class="space-y-6">
                <!-- Data se vygenerují přes JS -->
            </div>
        </div>
    </main>

    <!-- JS LOGIKA -->
    <script>
        // TVŮJ API TOKEN DOSTAZENÝ ZADAVATELEM
        const API_TOKEN = 'f2d2580030804accbe98bdbd14319a50';
        
        // Používáme bezplatnou CORS proxy, abychom obešli bezpečnostní omezení v prohlížeči
        const PROXY_URL = 'https://corsproxy.io/?';
        const API_URL = 'https://api.football-data.org/v4/matches';

        let allMatches = []; // Sem se stáhnou data z API
        let currentSport = 'football'; // Výchozí vybraný sport
        let currentStatusFilter = 'all'; // all | live | finished
        let searchQuery = '';

        // Pomocná mock data pro Hokej a Tenis (Demo režim, když API dává jen Fotbal)
        const demoHockeyMatches = [
            {
                competition: { name: "Tipsport Extraliga (Česko)" },
                homeTeam: { name: "HC Sparta Praha" },
                awayTeam: { name: "HC Dynamo Pardubice" },
                status: "IN_PLAY",
                score: { fullTime: { home: 3, away: 2 } },
                utcDate: new Date().toISOString()
            },
            {
                competition: { name: "NHL" },
                homeTeam: { name: "Boston Bruins" },
                awayTeam: { name: "New York Rangers" },
                status: "TIMED",
                score: { fullTime: { home: null, away: null } },
                utcDate: new Date(Date.now() + 7200000).toISOString()
            }
        ];

        const demoTennisMatches = [
            {
                competition: { name: "Wimbledon - Muži" },
                homeTeam: { name: "J. Sinner" },
                awayTeam: { name: "C. Alcaraz" },
                status: "IN_PLAY",
                score: { fullTime: { home: 2, away: 1 } },
                utcDate: new Date().toISOString()
            }
        ];

        // Spuštění při načtení stránky
        window.addEventListener('DOMContentLoaded', () => {
            loadRealFootballData();
        });

        // Přepínání sportů v levém menu
        function switchSport(sport) {
            currentSport = sport;
            
            // Upravíme vzhled tlačítek sportů
            document.querySelectorAll('[id^="btn-sport-"]').forEach(btn => {
                btn.className = "flex items-center justify-between px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 font-semibold transition-all duration-200 mt-1";
            });
            
            const activeBtn = document.getElementById(`btn-sport-${sport}`);
            if (activeBtn) {
                activeBtn.className = "flex items-center justify-between px-3 py-3 rounded-xl bg-brand-neon/10 text-brand-neon font-semibold transition-all duration-200 mt-1";
            }

            if (sport === 'football') {
                loadRealFootballData();
            } else if (sport === 'hockey') {
                renderMatches(demoHockeyMatches);
            } else if (sport === 'tennis') {
                renderMatches(demoTennisMatches);
            }
        }

        // Přepínání stavových filtrů (Všechny, Živě, Konec)
        function setStatusFilter(status) {
            currentStatusFilter = status;
            
            document.querySelectorAll('[id^="btn-filter-"]').forEach(btn => {
                btn.className = "px-4 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white transition-all duration-200";
            });

            const activeBtn = document.getElementById(`btn-filter-${status}`);
            if (activeBtn) {
                activeBtn.className = "px-4 py-2 rounded-lg text-sm font-bold bg-brand-neon text-brand-bg transition-all duration-200";
            }

            if (currentSport === 'football') {
                applyFiltersAndRender(allMatches);
            } else if (currentSport === 'hockey') {
                applyFiltersAndRender(demoHockeyMatches);
            } else if (currentSport === 'tennis') {
                applyFiltersAndRender(demoTennisMatches);
            }
        }

        // Vyhledávání v reálném čase
        function filterMatches() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            if (currentSport === 'football') {
                applyFiltersAndRender(allMatches);
            } else if (currentSport === 'hockey') {
                applyFiltersAndRender(demoHockeyMatches);
            } else if (currentSport === 'tennis') {
                applyFiltersAndRender(demoTennisMatches);
            }
        }

        // HLAVNÍ FUNKCE: Stažení reálných fotbalových dat přes CORS proxy
        async function loadRealFootballData() {
            toggleUIState('loading');
            const icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('animate-spin');

            try {
                // Sestavení URL adresy s CORS Proxy
                const targetUrl = `${API_URL}`;
                const proxyRequestUrl = `${PROXY_URL}${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyRequestUrl, {
                    method: 'GET',
                    headers: {
                        'X-Auth-Token': API_TOKEN,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Chyba serveru (${response.status}). Zkontroluj funkčnost API klíče.`);
                }

                const data = await response.json();
                allMatches = data.matches || [];

                // Aktualizace počtu fotbalových zápasů v sidebar menu
                document.getElementById('football-count').textContent = allMatches.length;

                // Nastavíme čas aktualizace
                const now = new Date();
                document.getElementById('update-timestamp').textContent = `Poslední aktualizace: ${now.toLocaleTimeString('cs-CZ')}`;

                applyFiltersAndRender(allMatches);
                toggleUIState('data');
            } catch (err) {
                console.error("Chyba při stahování API:", err);
                document.getElementById('error-message').textContent = err.message || "Nepodařilo se navázat spojení se sportovním API.";
                toggleUIState('error');
            } finally {
                if (icon) icon.classList.remove('animate-spin');
            }
        }

        // Filtrování stažených dat před vykreslením
        function applyFiltersAndRender(matchesList) {
            let filtered = matchesList;

            // 1. Stavový filtr (Live / Ukončené)
            if (currentStatusFilter === 'live') {
                filtered = filtered.filter(m => m.status === 'IN_PLAY' || m.status === 'LIVE' || m.status === 'PAUSED');
            } else if (currentStatusFilter === 'finished') {
                filtered = filtered.filter(m => m.status === 'FINISHED');
            }

            // 2. Vyhledávací filtr
            if (searchQuery.trim() !== '') {
                filtered = filtered.filter(m => 
                    m.homeTeam.name.toLowerCase().includes(searchQuery) ||
                    m.awayTeam.name.toLowerCase().includes(searchQuery) ||
                    m.competition.name.toLowerCase().includes(searchQuery)
                );
            }

            renderMatches(filtered);
        }

        // Vykreslení zápisů do HTML (Seskupeno podle ligy)
        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            if (!matches || matches.length === 0) {
                container.innerHTML = `
                    <div class="glass p-12 rounded-3xl border border-brand-border text-center">
                        <i class="fa-regular fa-calendar text-gray-600 text-4xl mb-3"></i>
                        <h4 class="text-lg font-bold text-white mb-1">Žádné zápasy nenalezeny</h4>
                        <p class="text-sm text-gray-500">Zkus změnit filtry nebo vyhledávaný výraz.</p>
                    </div>
                `;
                return;
            }

            // Seskupení zápasů podle ligy
            const grouped = {};
            matches.forEach(match => {
                const leagueName = match.competition.name;
                if (!grouped[leagueName]) {
                    grouped[leagueName] = [];
                }
                grouped[leagueName].push(match);
            });

            // Generování HTML pro každou ligu a její zápasy
            for (const [league, leagueMatches] of Object.entries(grouped)) {
                let leagueHTML = `
                    <div class="glass rounded-3xl border border-brand-border/40 overflow-hidden">
                        <!-- Hlavička Ligy -->
                        <div class="px-6 py-4 bg-white/[0.02] border-b border-brand-border/40 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="h-6 w-6 rounded bg-brand-neon/10 flex items-center justify-center text-brand-neon text-xs">
                                    <i class="fa-solid fa-trophy"></i>
                                </div>
                                <h3 class="font-bold text-sm tracking-wide text-gray-200">${league}</h3>
                            </div>
                            <span class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">${leagueMatches.length} zápasů</span>
                        </div>
                        
                        <!-- List zápasů -->
                        <div class="divide-y divide-brand-border/30">
                `;

                leagueMatches.forEach(match => {
                    const homeScore = match.score.fullTime.home !== null ? match.score.fullTime.home : '-';
                    const awayScore = match.score.fullTime.away !== null ? match.score.fullTime.away : '-';
                    
                    // Nastavení formátu stavu/času zápasu
                    let statusBadge = '';
                    let scoreClass = 'text-gray-400';

                    if (match.status === 'IN_PLAY' || match.status === 'LIVE') {
                        statusBadge = `
                            <span class="flex items-center gap-1.5 px-2 py-1 rounded bg-brand-neon/10 border border-brand-neon/30 text-[10px] font-extrabold text-brand-neon tracking-wide">
                                <span class="h-1.5 w-1.5 rounded-full bg-brand-neon live-pulse"></span>
                                ŽIVĚ
                            </span>
                        `;
                        scoreClass = 'text-brand-neon font-black';
                    } else if (match.status === 'PAUSED') {
                        statusBadge = `
                            <span class="px-2 py-1 rounded bg-amber-500/10 border border-amber-500/30 text-[10px] font-extrabold text-amber-400 tracking-wide">
                                POLOČAS
                            </span>
                        `;
                        scoreClass = 'text-amber-400 font-bold';
                    } else if (match.status === 'FINISHED') {
                        statusBadge = `<span class="text-xs font-semibold text-gray-500">Konec</span>`;
                        scoreClass = 'text-white font-extrabold';
                    } else {
                        // Plánovaný zápas - převedeme UTC čas na lokální formát HH:MM
                        const matchDate = new Date(match.utcDate);
                        const hours = String(matchDate.getHours()).padStart(2, '0');
                        const mins = String(matchDate.getMinutes()).padStart(2, '0');
                        statusBadge = `<span class="text-xs font-bold text-gray-400 tracking-wide">${hours}:${mins}</span>`;
                    }

                    leagueHTML += `
                        <div class="p-4 sm:p-5 flex items-center justify-between hover:bg-white/[0.01] transition-all duration-150">
                            <!-- Levá sekce: Stav / Čas -->
                            <div class="w-16 sm:w-24 flex flex-col justify-center">
                                ${statusBadge}
                            </div>

                            <!-- Střední sekce: Týmy -->
                            <div class="flex-grow flex flex-col gap-2 px-4">
                                <div class="flex items-center gap-3">
                                    <span class="text-sm font-semibold text-gray-200 hover:text-white transition-all cursor-pointer">${match.homeTeam.name}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="text-sm font-semibold text-gray-200 hover:text-white transition-all cursor-pointer">${match.awayTeam.name}</span>
                                </div>
                            </div>

                            <!-- Pravá sekce: Skóre -->
                            <div class="flex items-center gap-5">
                                <div class="flex flex-col gap-2 items-end justify-center text-right font-mono text-base ${scoreClass}">
                                    <div>${homeScore}</div>
                                    <div>${awayScore}</div>
                                </div>
                                
                                <!-- Hvězdička na přidání k oblíbeným -->
                                <button onclick="toggleFavorite(this)" class="text-gray-600 hover:text-yellow-400 transition-all p-1">
                                    <i class="fa-regular fa-star text-sm"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                leagueHTML += `
                        </div>
                    </div>
                `;
                container.innerHTML += leagueHTML;
            }
        }

        // Toggle oblíbených (vizuální změna)
        function toggleFavorite(btn) {
            const star = btn.querySelector('i');
            if (star.classList.contains('fa-regular')) {
                star.className = 'fa-solid fa-star text-yellow-400';
            } else {
                star.className = 'fa-regular fa-star text-gray-600';
            }
        }

        // Pomocník pro změnu stavu obrazovky
        function toggleUIState(state) {
            const loading = document.getElementById('loading-state');
            const error = document.getElementById('error-state');
            const matches = document.getElementById('matches-container');

            if (state === 'loading') {
                loading.classList.remove('hidden');
                error.classList.add('hidden');
                matches.classList.add('hidden');
            } else if (state === 'error') {
                loading.classList.add('hidden');
                error.classList.remove('hidden');
                matches.classList.add('hidden');
            } else if (state === 'data') {
                loading.classList.add('hidden');
                error.classList.add('hidden');
                matches.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
